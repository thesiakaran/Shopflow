name: ShopFlow CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Compile and Verify Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend Microservices
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

  build-and-push-docker:
    name: Build & Push Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only push images on merges/pushes to main/master, not on PR builds
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Auth Service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/auth-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest

      - name: Build & Push Product Catalog Service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/product-catalog-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/product-catalog-service:latest

      - name: Build & Push Cart & Order Service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/cart-order-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cart-order-service:latest

      - name: Build & Push Inventory Service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/inventory-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/inventory-service:latest

      - name: Build & Push Notification Service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/notification-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest

      - name: Build & Push API Gateway
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/api-gateway/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
