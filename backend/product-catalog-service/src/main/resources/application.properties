server.port=8082
spring.application.name=product-catalog-service

# PostgreSQL Connection (Electronics)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ShopFlow}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# MongoDB Connection (Fashion)
spring.data.mongodb.uri=mongodb://${MONGO_HOST:127.0.0.1}:${MONGO_PORT:27017}/${MONGO_DB:shopflow}
spring.data.mongodb.database=${MONGO_DB:shopflow}

# JWT Config
jwt.secret=ShopFlowSuperSecretKey2024XYZABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij
jwt.expiration=86400000
