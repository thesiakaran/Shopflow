apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  ports:
    - port: {{ .Values.services.apiGateway.port }}
      targetPort: {{ .Values.services.apiGateway.port }}
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.services.apiGateway.replicas }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: {{ .Values.services.apiGateway.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.apiGateway.port }}
          env:
            - name: AUTH_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: AUTH_SERVICE_HOST
            - name: PRODUCT_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: PRODUCT_SERVICE_HOST
            - name: CART_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: CART_SERVICE_HOST
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.services.apiGateway.port }}
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.services.apiGateway.port }}
            initialDelaySeconds: 45
            periodSeconds: 15
