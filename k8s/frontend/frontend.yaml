apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shopflow
spec:
  ports:
    - port: 5173
      targetPort: 5173
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: shopflow/frontend:latest
          ports:
            - containerPort: 5173
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: BACKEND_URL
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 15
            periodSeconds: 15
