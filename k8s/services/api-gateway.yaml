apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: shopflow
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shopflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: shopflow/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: AUTH_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: AUTH_SERVICE_HOST
            - name: PRODUCT_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: PRODUCT_SERVICE_HOST
            - name: CART_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: CART_SERVICE_HOST
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
