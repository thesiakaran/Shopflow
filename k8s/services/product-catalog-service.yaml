apiVersion: v1
kind: Service
metadata:
  name: product-catalog-service
  namespace: shopflow
spec:
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: product-catalog-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-catalog-service
  namespace: shopflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-catalog-service
  template:
    metadata:
      labels:
        app: product-catalog-service
    spec:
      containers:
        - name: product-catalog-service
          image: shopflow/product-catalog-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopflow-secrets
                  key: POSTGRES_PASSWORD
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: MONGO_HOST
            - name: MONGO_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: MONGO_PORT
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: MONGO_DB
            - name: ELASTICSEARCH_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: ELASTICSEARCH_HOST
            - name: ELASTICSEARCH_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: ELASTICSEARCH_PORT
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: REDIS_PORT
            - name: CACHE_TYPE
              valueFrom:
                configMapKeyRef:
                  name: shopflow-config
                  key: CACHE_TYPE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopflow-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 15
